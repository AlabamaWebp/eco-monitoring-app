<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">EM</span>
      <div>
        <h1>Eco Monitoring</h1>
        <p>Система экологических измерений</p>
      </div>
    </div>

    <nav class="nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        class="nav-link"
      >
        {{ item.label }}
      </a>
    </nav>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
